<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scout — Chat</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/chat.css">
</head>
<body>

<div class="chat-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Scout</h1>
      <button id="newConvBtn">+ New conversation</button>
      <div class="checkpoint-selector">
        <label for="checkpointSelect">Checkpoint</label>
        <select id="checkpointSelect"></select>
      </div>
      <div class="module-toggles" id="moduleToggles"></div>
      <details class="generation-settings" id="generationSettings">
        <summary>Generation</summary>
        <div class="gen-field">
          <label for="genTemperature">Temperature <span class="gen-val" id="genTemperatureVal"></span></label>
          <input type="range" id="genTemperature" min="0.1" max="2.0" step="0.05">
        </div>
        <div class="gen-field">
          <label for="genVocabulary">Vocabulary <span class="gen-val" id="genVocabularyVal"></span></label>
          <input type="range" id="genVocabulary" min="1" max="200" step="1">
        </div>
        <div class="gen-field">
          <label for="genRepPenalty">Repetition <span class="gen-val" id="genRepPenaltyVal"></span></label>
          <input type="range" id="genRepPenalty" min="1.0" max="2.0" step="0.05">
        </div>
        <div class="gen-field">
          <label for="genMaxTokens">Max tokens <span class="gen-val" id="genMaxTokensVal"></span></label>
          <input type="range" id="genMaxTokens" min="32" max="1024" step="32">
        </div>
        <button class="gen-reset" id="genResetBtn">Reset to defaults</button>
      </details>
    </div>
    <div class="conversation-list" id="convList">
    </div>
  </aside>

  <main class="chat-panel" id="chatPanel">
    <div class="token-bar" id="tokenBar" style="display:none">
      <span class="token-bar-label">Context</span>
      <div class="token-bar-track">
        <div class="token-bar-fill" id="tokenBarFill"></div>
      </div>
      <span class="token-bar-count" id="tokenBarCount"></span>
    </div>
    <div class="no-conversation" id="noConversation">
      Select or start a conversation.
    </div>
  </main>

</div>

<script type="module" src="/static/chat.js"></script>
</body>
</html>

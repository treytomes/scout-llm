<!DOCTYPE html>
<html>
<head>
  <title>Dataset Preview</title>
  <link rel="stylesheet" href="/static/preview.css">
</head>
<body>

  <h1 id="title"></h1>

  <div class="toolbar">
    <button id="homeButton">Home</button>
  </div>

  <div class="metadata">
    <span id="metaDataset"></span>
    <span id="metaSplit"></span>
    <span id="metaRows"></span>
    <span id="metaPage"></span>
    <span id="metaPageCount"></span>
  </div>


  <div class="planner">
    <h2>Training Planner</h2>

    <label>
      Block Size
      <input id="blockSizeInput" type="number" value="2048">
    </label>

    <label>
      Batch Size
      <input id="batchSizeInput" type="number" value="8">
    </label>

    <button id="planBtn">Generate Plan</button>

    <table id="planTable" class="plan-table"></table>
  </div>

  <div class="toolbar">
    <button id="firstBtn">First</button>
    <button id="prevBtn">Prev</button>
    <button id="nextBtn">Next</button>
    <button id="lastBtn">Last</button>
  </div>

  <div class="table-container">
    <table id="dataTable"></table>
  </div>

  <script type="module" src="/static/preview.js"></script>

</body>
</html>

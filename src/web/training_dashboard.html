<!DOCTYPE html>
<html>
<head>
  <title>Scout Training Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/training_dashboard.css">
</head>

<body>

  <div class="db">

  <!-- ── Training control ── -->
  <div class="training-control" id="trainingControl">
    <div class="training-status-row">
      <span class="training-indicator" id="trainingIndicator"></span>
      <span class="training-status-text" id="trainingStatusText">Checking...</span>
      <div class="training-actions">
        <button id="startBtn">Start Training</button>
        <button id="stopBtn" class="secondary" style="display:none">Stop</button>
      </div>
    </div>

    <!-- ── Start training dialog ── -->
    <div class="training-dialog" id="trainingDialog" style="display:none">
      <div class="training-dialog-row">
        <label for="tdDataset">Dataset</label>
        <input id="tdDataset" type="text" value="scout_dialogue">
      </div>
      <div class="training-dialog-row">
        <label for="tdSteps">Steps</label>
        <input id="tdSteps" type="number" value="400" min="1">
      </div>
      <div class="training-dialog-row">
        <label for="tdLr">Learning rate</label>
        <input id="tdLr" type="text" value="5e-5">
      </div>
      <div class="training-dialog-row">
        <label for="tdWarmup">Warmup steps</label>
        <input id="tdWarmup" type="number" value="50" min="0">
      </div>
      <div class="training-dialog-row">
        <label for="tdBatch">Batch size</label>
        <input id="tdBatch" type="number" value="8" min="1">
      </div>
      <div class="training-dialog-row">
        <label for="tdModuleConfig">Module config</label>
        <select id="tdModuleConfig">
          <option value="tinystories">tinystories</option>
          <option value="conversational">conversational</option>
        </select>
      </div>
      <div class="training-dialog-row">
        <label>
          <input id="tdFreezeModule0" type="checkbox" checked>
          Freeze module 0 (TinyStories core)
        </label>
      </div>
      <div class="training-dialog-row">
        <label>
          <input id="tdFreezeLC" type="checkbox">
          Freeze language core (embedding + head)
        </label>
      </div>
      <div class="training-dialog-row">
        <label>
          <input id="tdResetOptimizer" type="checkbox" checked>
          Reset optimizer (fresh LR schedule)
        </label>
      </div>
      <div class="training-dialog-actions">
        <button id="tdConfirmBtn">Start</button>
        <button id="tdCancelBtn" class="secondary">Cancel</button>
      </div>
    </div>

    <div id="trainingProgressWrap" style="display:none">
      <progress id="trainingProgress" value="0" max="100" style="width:100%; margin-top:8px;"></progress>
      <div class="training-progress-label" id="trainingProgressLabel"></div>
    </div>
    <div id="trainingError" class="training-error" style="display:none"></div>
  </div>

  <div class="metrics">
    <div class="metric">
      <p class="metric-label">step</p>
      <p class="metric-value" id="m-step">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">train loss</p>
      <p class="metric-value" id="m-loss">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">val loss</p>
      <p class="metric-value" id="m-val">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">tokens/sec</p>
      <p class="metric-value" id="m-tps">—</p>
      <p class="metric-sub" id="m-eta"></p>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#378ADD;"></span>train loss</span>
    <span class="legend-item"><span class="legend-dot" style="background:#1D9E75;border:1px dashed #1D9E75;background:transparent;"></span>val loss</span>
  </div>

  <div class="chart-wrap">
    <canvas id="lossChart"></canvas>
  </div>

  <p class="section-label">Available training logs</p>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>File</th>
          <th class="sortable" data-col="date" data-dir="desc">Date <span class="sort-icon">↓</span></th>
          <th class="sortable" data-col="index" data-dir="desc">Index <span class="sort-icon">↓</span></th>
          <th>Start Step</th>
          <th>End Step</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="trainingLogsBody">
        <tr><td colspan="4" class="empty-state">Loading logs…</td></tr>
      </tbody>
    </table>
  </div>

  <p class="section-label">Training log data</p>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Step</th>
          <th>Loss</th>
          <th>Avg Loss</th>
          <th>LR</th>
          <th>Val Loss</th>
          <th>Tokens/sec</th>
        </tr>
      </thead>
      <tbody id="logDataBody">
        <tr><td colspan="6" class="empty-state">Select a training log above.</td></tr>
      </tbody>
    </table>
  </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script type="module" src="/static/training_dashboard.js"></script>
</body>
</html>

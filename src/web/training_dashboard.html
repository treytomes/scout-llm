<!DOCTYPE html>
<html>
<head>
  <title>Scout Training Dashboard</title>
  <link rel="stylesheet" href="/static/training_dashboard.css">
</head>

<body>
  <h2 class="sr-only">Scout training dashboard</h2>

  <div class="db">

  <p class="section-label">Available training logs</p>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>File</th>
          <th>Date</th>
          <th>Index</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="trainingLogsBody">
        <tr><td colspan="4" class="empty-state">Loading logs…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="metrics">
    <div class="metric">
      <p class="metric-label">step</p>
      <p class="metric-value" id="m-step">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">train loss</p>
      <p class="metric-value" id="m-loss">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">val loss</p>
      <p class="metric-value" id="m-val">—</p>
    </div>

    <div class="metric">
      <p class="metric-label">tokens/sec</p>
      <p class="metric-value" id="m-tps">—</p>
      <p class="metric-sub" id="m-eta"></p>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#378ADD;"></span>train loss</span>
    <span class="legend-item"><span class="legend-dot" style="background:#1D9E75;border:1px dashed #1D9E75;background:transparent;"></span>val loss</span>
  </div>

  <div class="chart-wrap">
    <canvas id="lossChart"></canvas>
  </div>

  <p class="section-label">Training log data</p>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Step</th>
          <th>Loss</th>
          <th>Avg Loss</th>
          <th>LR</th>
          <th>Val Loss</th>
          <th>Tokens/sec</th>
        </tr>
      </thead>
      <tbody id="logDataBody">
        <tr><td colspan="6" class="empty-state">Select a training log above.</td></tr>
      </tbody>
    </table>
  </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <script type="module" src="/static/training_dashboard.js"></script>
</body>
</html>
